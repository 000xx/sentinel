name: sentinel-anomaly-tracker

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Cache Kronos model weights
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            ~/.cache/torch
          key: kronos-mini-v1-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            kronos-mini-v1-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ ! -d "kronos_src" ]; then
            git clone --depth 1 https://github.com/shiyu-coder/Kronos.git kronos_src
          fi

      - name: Run pipeline
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PYTHONPATH: ${{ github.workspace }}/kronos_src
        run: python main.py

      - name: Commit state + alerts
        run: |
          git config user.name "Sentinel Bot"
          git config user.email "sentinel@pipeline.local"
          git add state.json site/alerts.json
          git diff --cached --quiet || git commit -m "state: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo "Push failed — non-fatal"
